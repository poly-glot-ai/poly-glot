# ============================================================
#  Wrangler configuration — Poly-Glot Auth Worker
#  https://developers.cloudflare.com/workers/wrangler/configuration/
# ============================================================

name            = "poly-glot-auth"
main            = "worker.js"
compatibility_date = "2024-09-23"

# ES-module format (required for `export default { fetch }` syntax)
# Wrangler v3 defaults to modules; explicit here for clarity.

# ── Account ──────────────────────────────────────────────────
# Set via CLOUDFLARE_ACCOUNT_ID environment variable in CI,
# or run: wrangler deploy (uses your logged-in account automatically).
# Never hardcode your account ID here in a public repo.

# ── Routes ───────────────────────────────────────────────────
# Serves the Worker for all /api/auth/* paths on poly-glot.ai.
# You must also add the route in the Cloudflare dashboard under
# Workers & Pages → your Worker → Triggers → Routes.
routes = [
  { pattern = "poly-glot.ai/api/auth/*",   zone_name = "poly-glot.ai" },
  { pattern = "poly-glot.ai/api/usage/*",  zone_name = "poly-glot.ai" },
  { pattern = "poly-glot.ai/api/stripe/*", zone_name = "poly-glot.ai" },
  { pattern = "poly-glot.ai/api/prompt/*", zone_name = "poly-glot.ai" }
]

# ── KV Namespaces ─────────────────────────────────────────────
# AUTH_KV is used for:
#   • rate-limit flags  (ratelimit:{email})
#   • magic-link tokens (token:{token})
#   • plan overrides    (plan:{email})       ← set by future Stripe webhook
#
# After running `wrangler kv:namespace create "AUTH_KV"` replace
# the placeholder IDs below with the values printed by that command.
[[kv_namespaces]]
binding    = "AUTH_KV"
id         = "4686b5dd158944e5856f7a402c6c6d2f"
preview_id = "4686b5dd158944e5856f7a402c6c6d2f"
# Run: wrangler kv:namespace create "AUTH_KV" and paste the IDs above
# Never commit real KV namespace IDs to a public repo

# ── Service binding to telemetry worker ──────────────────────────────────────
# Allows auth-worker to call telemetry-worker directly (no HTTP, no 522).
# The telemetry worker must be deployed first.
[[services]]
binding = "TELEMETRY_WORKER"
service = "polyglot-telemetry"

# ── Environment variables (non-secret) ───────────────────────
[vars]
BASE_URL = "https://poly-glot.ai"

# ── Secrets (set via CLI — never commit real values here) ────
# Run after deployment:
#   wrangler secret put RESEND_API_KEY
#
# Secret name    | Source
# ─────────────────────────────────────────────────────────────
# RESEND_API_KEY | https://resend.com/api-keys

# ── Observability (optional, recommended for production) ─────
[observability]
enabled = true

# ── Local development ─────────────────────────────────────────
# `wrangler dev` will serve the Worker at http://localhost:8787
# Use `.dev.vars` file for local secrets (git-ignored):
#
#   RESEND_API_KEY=re_xxxxxxxxxxxx
#   BASE_URL=http://localhost:8787

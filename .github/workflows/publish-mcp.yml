name: Publish MCP to npm

on:
  push:
    branches: [main]
    paths:
      - 'poly-glot-mcp/src/**'
      - 'poly-glot-mcp/package.json'
      - 'poly-glot-mcp/tsconfig.json'
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump (none = publish current version as-is)'
        required: false
        default: 'patch'
        type: choice
        options: [patch, minor, major, none]

permissions:
  contents: write

jobs:
  publish-mcp:
    runs-on: ubuntu-latest
    if: |
      !contains(github.event.head_commit.message, '[skip ci]') &&
      !contains(github.event.head_commit.message, 'chore: bump') &&
      !contains(github.event.head_commit.message, 'chore: release') &&
      !contains(github.event.head_commit.message, 'chore: auto-update')

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_PAT }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        working-directory: poly-glot-mcp
        run: npm ci --ignore-scripts

      - name: Build TypeScript
        working-directory: poly-glot-mcp
        run: npm run build

      - name: Determine version
        id: version
        working-directory: poly-glot-mcp
        run: |
          BUMP="${{ github.event.inputs.bump || 'patch' }}"
          REPO_VERSION=$(node -p "require('./package.json').version")
          NPM_VERSION=$(npm view poly-glot-mcp version 2>/dev/null || echo "0.0.0")

          echo "Repo version : $REPO_VERSION"
          echo "npm version  : $NPM_VERSION"
          echo "Bump type    : $BUMP"

          python3 -c "
          from packaging.version import Version
          repo=Version('$REPO_VERSION'); npm=Version('$NPM_VERSION'); bump='$BUMP'
          if bump == 'none' or repo > npm:
              print('SKIP_BUMP=true')
              print(f'NEW_VERSION=$REPO_VERSION')
          else:
              print('SKIP_BUMP=false')
              print(f'NEW_VERSION=$REPO_VERSION')
          " >> $GITHUB_ENV

          if [ "$SKIP_BUMP" != "true" ] && [ "$BUMP" != "none" ]; then
            npm version $BUMP --no-git-tag-version
            NEW_VERSION=$(node -p "require('./package.json').version")
            echo "NEW_VERSION=$NEW_VERSION" >> $GITHUB_ENV
          fi

          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT

      - name: Publish to npm
        working-directory: poly-glot-mcp
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Generate CHANGELOG entry
        run: |
          LAST_TAG=$(git tag --sort=-version:refname | grep "^mcp-" | head -1 || echo "")
          if [ -z "$LAST_TAG" ]; then
            COMMITS=$(git log --oneline -20 --no-merges -- poly-glot-mcp/ \
              | grep -v "\[skip ci\]\|chore: bump\|chore: auto-update\|chore: release")
          else
            COMMITS=$(git log ${LAST_TAG}..HEAD --oneline --no-merges -- poly-glot-mcp/ \
              | grep -v "\[skip ci\]\|chore: bump\|chore: auto-update\|chore: release")
          fi

          DATE=$(date -u +%Y-%m-%d)
          VERSION="${{ steps.version.outputs.new_version }}"
          ENTRY="## [${VERSION}] ŌĆö ${DATE}"$'\n'
          while IFS= read -r line; do
            MSG="${line:8}"
            if echo "$MSG" | grep -qiE "^feat"; then ENTRY+="- Ō£© ${MSG}"$'\n'
            elif echo "$MSG" | grep -qiE "^fix";  then ENTRY+="- ­¤Éø ${MSG}"$'\n'
            elif echo "$MSG" | grep -qiE "^perf"; then ENTRY+="- ŌÜĪ ${MSG}"$'\n'
            else ENTRY+="- ${MSG}"$'\n'; fi
          done <<< "$COMMITS"

          if [ -f poly-glot-mcp/CHANGELOG.md ]; then
            EXISTING=$(cat poly-glot-mcp/CHANGELOG.md)
            echo -e "${ENTRY}\n---\n\n${EXISTING}" > poly-glot-mcp/CHANGELOG.md
          else
            echo "$ENTRY" > poly-glot-mcp/CHANGELOG.md
          fi

      - name: Create GitHub Release
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GH_PAT }}
          script: |
            const version = '${{ steps.version.outputs.new_version }}';
            await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              tag_name:  `mcp-v${version}`,
              name:       `MCP Server v${version}`,
              body:       `## poly-glot-mcp v${version}\n\n\`\`\`json\n{"command":"npx","args":["-y","poly-glot-mcp"]}\n\`\`\`\n\n[View on npm](https://www.npmjs.com/package/poly-glot-mcp)`,
              draft:      false,
              prerelease: false,
            });
            console.log(`Ō£ģ Release mcp-v${version} created`);

      - name: Commit version bump + CHANGELOG
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add poly-glot-mcp/package.json poly-glot-mcp/package-lock.json poly-glot-mcp/CHANGELOG.md || true
          git diff --staged --quiet || \
            git commit -m "chore: release mcp v${{ steps.version.outputs.new_version }} [skip ci]"
          git push

      - name: Trigger site update
        run: |
          curl -s -X POST \
            -H "Authorization: Bearer ${{ secrets.GH_PAT }}" \
            -H "Accept: application/vnd.github+json" \
            -H "Content-Type: application/json" \
            "https://api.github.com/repos/poly-glot-ai/poly-glot/dispatches" \
            -d '{"event_type":"npm_published","client_payload":{"package":"poly-glot-mcp","version":"${{ steps.version.outputs.new_version }}"}}'

name: Publish MCP to npm

# ─────────────────────────────────────────────────────────────────────────────
# Triggers when ANY file under poly-glot-mcp/src/ changes on main.
# Automatically:
#   1. Bumps the patch version in poly-glot-mcp/package.json
#   2. Builds the TypeScript
#   3. Publishes to npm as poly-glot-mcp
#   4. Commits the version bump back to main
#   5. Triggers the site auto-update workflow
# ─────────────────────────────────────────────────────────────────────────────
on:
  push:
    branches: [main]
    paths:
      - 'poly-glot-mcp/src/**'
      - 'poly-glot-mcp/package.json'
      - 'poly-glot-mcp/tsconfig.json'
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump type'
        required: false
        default: 'patch'
        type: choice
        options: [patch, minor, major]

permissions:
  contents: write

jobs:
  publish-mcp:
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, '[skip ci]') && !contains(github.event.head_commit.message, 'chore: auto-update') && !contains(github.event.head_commit.message, 'chore: bump')"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_PAT }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        working-directory: poly-glot-mcp
        run: npm ci --ignore-scripts

      - name: Build TypeScript
        working-directory: poly-glot-mcp
        run: npm run build

      - name: Bump patch version
        working-directory: poly-glot-mcp
        run: |
          BUMP=${{ github.event.inputs.bump || 'patch' }}
          npm version $BUMP --no-git-tag-version
          NEW_VERSION=$(node -p "require('./package.json').version")
          echo "NEW_VERSION=$NEW_VERSION" >> $GITHUB_ENV
          echo "Bumped to $NEW_VERSION"

      - name: Publish to npm
        working-directory: poly-glot-mcp
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Commit version bump
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add poly-glot-mcp/package.json poly-glot-mcp/package-lock.json
          git commit -m "chore: bump poly-glot-mcp to v${{ env.NEW_VERSION }} [skip ci]"
          git push

      - name: Trigger site update
        run: |
          curl -s -X POST \
            -H "Authorization: Bearer ${{ secrets.GH_PAT }}" \
            -H "Accept: application/vnd.github+json" \
            -H "Content-Type: application/json" \
            "https://api.github.com/repos/poly-glot-ai/poly-glot/dispatches" \
            -d '{"event_type":"npm_published","client_payload":{"package":"poly-glot-mcp","version":"${{ env.NEW_VERSION }}"}}'
          echo "Site auto-update triggered"

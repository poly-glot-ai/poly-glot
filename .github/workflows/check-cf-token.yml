name: Check CF Token Scopes

on:
  workflow_dispatch: {}
  push:
    paths: ['.github/workflows/check-cf-token.yml']

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Check CF_API_TOKEN scopes and try DNS patch
        run: |
          ZONE_ID="c64151011b4628121001461ab291a0db"

          echo "=== Verifying CF_API_TOKEN ==="
          VERIFY=$(curl -s "https://api.cloudflare.com/client/v4/user/tokens/verify" \
            -H "Authorization: Bearer ${{ secrets.CF_API_TOKEN }}")
          echo "Token valid: $(echo $VERIFY | python3 -c 'import sys,json;d=json.load(sys.stdin);print(d.get("success",False))')"
          echo "Token status: $(echo $VERIFY | python3 -c 'import sys,json;d=json.load(sys.stdin);print(d.get("result",{}).get("status","unknown"))')"

          echo ""
          echo "=== Attempting DNS record list ==="
          DNS_LIST=$(curl -s \
            "https://api.cloudflare.com/client/v4/zones/${ZONE_ID}/dns_records?type=TXT&name=poly-glot.ai&per_page=50" \
            -H "Authorization: Bearer ${{ secrets.CF_API_TOKEN }}" \
            -H "Content-Type: application/json")
          echo "DNS list success: $(echo $DNS_LIST | python3 -c 'import sys,json;d=json.load(sys.stdin);print(d.get("success",False))')"

          SPF_ID=$(echo "$DNS_LIST" | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          for r in d.get('result', []) or []:
              if r.get('content','').startswith('v=spf1'):
                  print(r['id'])
                  break
          " 2>/dev/null)

          if [ -n "$SPF_ID" ]; then
            echo "Found SPF record ID: $SPF_ID"
            echo "=== Patching SPF ==="
            NEW_SPF="v=spf1 include:_spf.mx.cloudflare.net include:amazonses.com ~all"
            PATCH=$(curl -s -X PATCH \
              "https://api.cloudflare.com/client/v4/zones/${ZONE_ID}/dns_records/${SPF_ID}" \
              -H "Authorization: Bearer ${{ secrets.CF_API_TOKEN }}" \
              -H "Content-Type: application/json" \
              -d "{\"type\":\"TXT\",\"name\":\"poly-glot.ai\",\"content\":\"${NEW_SPF}\",\"ttl\":1}")
            echo "Patch success: $(echo $PATCH | python3 -c 'import sys,json;d=json.load(sys.stdin);print(d.get("success",False))')"
            echo "After: $NEW_SPF"
          else
            echo "SPF record not found or DNS list failed — manual update required"
            echo "Go to: https://dash.cloudflare.com -> poly-glot.ai -> DNS"
            echo "Edit TXT record: v=spf1 include:_spf.mx.cloudflare.net include:amazonses.com ~all"
          fi

          echo ""
          echo "=== Current SPF via dig ==="
          dig TXT poly-glot.ai +short | grep spf || echo "SPF not found via dig"

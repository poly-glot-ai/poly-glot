name: Check CF Token Scopes

on:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Check CF_API_TOKEN scopes
        run: |
          RESPONSE=$(curl -s "https://api.cloudflare.com/client/v4/user/tokens/verify" \
            -H "Authorization: Bearer ${{ secrets.CF_API_TOKEN }}")
          echo "Response: $RESPONSE"
          SUCCESS=$(echo "$RESPONSE" | python3 -c "import sys,json;d=json.load(sys.stdin);print(d.get('success',False))")
          echo "Token valid: $SUCCESS"
          if [ "$SUCCESS" = "True" ]; then
            echo "Token details:"
            echo "$RESPONSE" | python3 -c "
import sys,json
d = json.load(sys.stdin)
r = d.get('result',{})
print('Status:', r.get('status'))
print('Not before:', r.get('not_before'))
print('Expires on:', r.get('expires_on'))
"
          fi

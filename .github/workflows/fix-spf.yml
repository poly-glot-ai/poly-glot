name: Fix SPF Record for Resend

on:
  workflow_dispatch:
    inputs:
      cf_api_token:
        description: 'Cloudflare API Token (Zone:DNS:Edit scope) — get from dash.cloudflare.com/profile/api-tokens'
        required: true
        type: string

jobs:
  fix-spf:
    runs-on: ubuntu-latest
    steps:
      - name: Find + update SPF record
        run: |
          ZONE_ID="c64151011b4628121001461ab291a0db"
          CF_TOKEN="${{ github.event.inputs.cf_api_token }}"
          NEW_SPF="v=spf1 include:_spf.mx.cloudflare.net include:amazonses.com ~all"

          echo "🔍 Listing TXT records for poly-glot.ai..."
          RESPONSE=$(curl -s \
            "https://api.cloudflare.com/client/v4/zones/${ZONE_ID}/dns_records?type=TXT&name=poly-glot.ai&per_page=50" \
            -H "Authorization: Bearer ${CF_TOKEN}" \
            -H "Content-Type: application/json")

          echo "List response success: $(echo $RESPONSE | python3 -c 'import sys,json;d=json.load(sys.stdin);print(d["success"])')"

          SPF_ID=$(echo "$RESPONSE" | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          for r in d.get('result', []) or []:
              if r.get('content','').startswith('v=spf1'):
                  print(r['id'])
                  break
          ")

          if [ -n "$SPF_ID" ]; then
            echo "✏️  Patching existing SPF record: $SPF_ID"
            PATCH=$(curl -s -X PATCH \
              "https://api.cloudflare.com/client/v4/zones/${ZONE_ID}/dns_records/${SPF_ID}" \
              -H "Authorization: Bearer ${CF_TOKEN}" \
              -H "Content-Type: application/json" \
              -d "{\"type\":\"TXT\",\"name\":\"poly-glot.ai\",\"content\":\"${NEW_SPF}\",\"ttl\":1}")
            echo "Patch result: $(echo $PATCH | python3 -c 'import sys,json;d=json.load(sys.stdin);print(d["success"])')"
          else
            echo "➕ No SPF record found — creating new record"
            POST=$(curl -s -X POST \
              "https://api.cloudflare.com/client/v4/zones/${ZONE_ID}/dns_records" \
              -H "Authorization: Bearer ${CF_TOKEN}" \
              -H "Content-Type: application/json" \
              -d "{\"type\":\"TXT\",\"name\":\"poly-glot.ai\",\"content\":\"${NEW_SPF}\",\"ttl\":1}")
            echo "Create result: $(echo $POST | python3 -c 'import sys,json;d=json.load(sys.stdin);print(d["success"])')"
          fi

      - name: Verify SPF propagation
        run: |
          sleep 5
          echo "=== Current SPF record ==="
          dig TXT poly-glot.ai +short | grep spf || echo "Propagating..."

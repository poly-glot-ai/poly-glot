name: Publish VS Code Extension

# ─────────────────────────────────────────────────────────────────────────────
# Fully automatic. Triggers on:
#   1. Push to vscode-extension/src/** or package.json  → auto patch-bump + publish
#   2. workflow_dispatch with bump choice                → manual major/minor/patch/none
#
# Steps every run:
#   1. Detect if version already bumped (prevents double-bump on manual commits)
#   2. Bump version in package.json (unless already ahead of marketplace or bump=none)
#   3. Compile TypeScript
#   4. Package .vsix with vsce
#   5. Publish to VS Code Marketplace (VSCE_PAT secret)
#   6. Create GitHub Release with .vsix attached
#   7. Auto-generate CHANGELOG entry from commits since last version
#   8. Commit version bump + CHANGELOG back to repo [skip ci]
#   9. Copy .vsix to vscode-extension/ for watcher download
#  10. Notify local macOS watcher via repository_dispatch → Desktop notification
#  11. Trigger site auto-update workflow
# ─────────────────────────────────────────────────────────────────────────────
on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump (none = publish current version as-is)'
        required: false
        default: 'none'
        type: choice
        options: [patch, minor, major, none]

permissions:
  contents: write

env:
  PUBLISHER: poly-glot-ai
  EXTENSION: poly-glot

jobs:
  publish-vscode:
    runs-on: ubuntu-latest
    if: |
      !contains(github.event.head_commit.message, '[skip ci]') &&
      !contains(github.event.head_commit.message, 'chore: auto-update') &&
      !contains(github.event.head_commit.message, 'chore: bump') &&
      !contains(github.event.head_commit.message, 'chore: release')

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_PAT }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install vsce + dependencies
        working-directory: vscode-extension
        run: |
          npm install -g @vscode/vsce
          npm ci --ignore-scripts

      - name: Compile TypeScript
        working-directory: vscode-extension
        run: npm run compile

      - name: Determine version
        id: version
        working-directory: vscode-extension
        run: |
          BUMP="${{ github.event.inputs.bump || 'patch' }}"

          REPO_VERSION=$(node -p "require('./package.json').version")

          # Fetch current marketplace version
          MKT_VERSION=$(curl -s -X POST \
            -H "Content-Type: application/json" \
            -H "Accept: application/json;api-version=3.0-preview.1" \
            "https://marketplace.visualstudio.com/_apis/public/gallery/extensionquery" \
            -d "{\"filters\":[{\"criteria\":[{\"filterType\":7,\"value\":\"${PUBLISHER}.${EXTENSION}\"}]}],\"flags\":914}" \
            | python3 -c "import json,sys; d=json.load(sys.stdin); print(d['results'][0]['extensions'][0]['versions'][0]['version'])" 2>/dev/null || echo "0.0.0")

          echo "Repo version    : $REPO_VERSION"
          echo "Marketplace ver : $MKT_VERSION"
          echo "Bump type       : $BUMP"

          # If repo version is already AHEAD of marketplace, skip bump and publish as-is.
          # Use printf to write python script — avoids << heredoc (YAML merge-key conflict).
          printf '%s\n' \
            'import sys' \
            'from packaging.version import Version' \
            'repo_v = Version(sys.argv[1])' \
            'mkt_v  = Version(sys.argv[2])' \
            'bump   = sys.argv[3]' \
            "print('true' if bump == 'none' or repo_v > mkt_v else 'false')" \
            > /tmp/semver_check.py
          SKIP_BUMP=$(python3 /tmp/semver_check.py "$REPO_VERSION" "$MKT_VERSION" "$BUMP")
          echo "SKIP_BUMP=$SKIP_BUMP" >> $GITHUB_ENV
          NEW_VERSION="$REPO_VERSION"

          # Actual bump if needed
          if [ "$SKIP_BUMP" != "true" ] && [ "$BUMP" != "none" ]; then
            npm version $BUMP --no-git-tag-version
            NEW_VERSION=$(node -p "require('./package.json').version")
          fi

          echo "NEW_VERSION=$NEW_VERSION" >> $GITHUB_ENV
          echo "Final version: $NEW_VERSION"
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT

      - name: Package .vsix
        working-directory: vscode-extension
        run: |
          vsce package --no-dependencies --out poly-glot-${{ steps.version.outputs.new_version }}.vsix
          echo "VSIX_PATH=vscode-extension/poly-glot-${{ steps.version.outputs.new_version }}.vsix" >> $GITHUB_ENV

      - name: Publish to Marketplace
        working-directory: vscode-extension
        run: |
          if [ -z "$VSCE_PAT" ]; then
            echo "⚠️  VSCE_PAT secret is not set — skipping Marketplace publish."
            echo "ℹ️  To enable auto-publish, add VSCE_PAT to repo secrets:"
            echo "    https://github.com/poly-glot-ai/poly-glot/settings/secrets/actions"
            echo "    Get a PAT at: https://dev.azure.com → User Settings → Personal Access Tokens"
            echo "    Scope required: Marketplace → Manage"
            echo "publish_skipped=true" >> $GITHUB_ENV
          else
            vsce publish --no-dependencies \
              --packagePath poly-glot-${{ steps.version.outputs.new_version }}.vsix
            echo "publish_skipped=false" >> $GITHUB_ENV
          fi
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}

      - name: Generate CHANGELOG entry
        id: changelog
        run: |
          # Get last tag or fallback to 20 commits
          LAST_TAG=$(git tag --sort=-version:refname | head -1 || true)
          if [ -z "$LAST_TAG" ]; then
            COMMITS=$(git log --oneline -20 --no-merges \
              -- vscode-extension/ poly-glot-mcp/ cli/ index.html \
              | grep -v "\[skip ci\]\|chore: bump\|chore: auto-update\|chore: release" || true)
          else
            COMMITS=$(git log "${LAST_TAG}..HEAD" --oneline --no-merges \
              -- vscode-extension/ poly-glot-mcp/ cli/ index.html \
              | grep -v "\[skip ci\]\|chore: bump\|chore: auto-update\|chore: release" || true)
          fi

          DATE=$(date -u +%Y-%m-%d)
          VERSION="${{ steps.version.outputs.new_version }}"

          # Build changelog block
          ENTRY="## [${VERSION}] — ${DATE}"$'\n'
          if [ -z "$COMMITS" ]; then
            ENTRY+="- 🔧 maintenance release"$'\n'
          else
            while IFS= read -r line; do
              [ -z "$line" ] && continue
              MSG="${line:8}"
              # Categorise by conventional commit prefix
              if echo "$MSG" | grep -qiE "^feat"; then
                ENTRY+="- ✨ ${MSG}"$'\n'
              elif echo "$MSG" | grep -qiE "^fix"; then
                ENTRY+="- 🐛 ${MSG}"$'\n'
              elif echo "$MSG" | grep -qiE "^perf"; then
                ENTRY+="- ⚡ ${MSG}"$'\n'
              elif echo "$MSG" | grep -qiE "^docs"; then
                ENTRY+="- 📖 ${MSG}"$'\n'
              elif echo "$MSG" | grep -qiE "^ci|^chore"; then
                ENTRY+="- 🔧 ${MSG}"$'\n'
              else
                ENTRY+="- ${MSG}"$'\n'
              fi
            done <<< "$COMMITS"
          fi

          echo "CHANGELOG_ENTRY<<EOF" >> $GITHUB_ENV
          echo "$ENTRY" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

          # Write to CHANGELOG.md
          if [ -f vscode-extension/CHANGELOG.md ]; then
            EXISTING=$(cat vscode-extension/CHANGELOG.md || true)
            printf '%s\n---\n\n%s\n' "$ENTRY" "$EXISTING" > vscode-extension/CHANGELOG.md
          else
            printf '%s\n' "$ENTRY" > vscode-extension/CHANGELOG.md
          fi
          echo "changelog_written=true" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GH_PAT }}
          script: |
            const fs = require('fs');
            const version = '${{ steps.version.outputs.new_version }}';
            const vsixPath = 'vscode-extension/poly-glot-' + version + '.vsix';

            // Create the release
            const release = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              tag_name:   `vscode-v${version}`,
              name:        `VS Code Extension v${version}`,
              body:        `## Poly-Glot AI VS Code Extension v${version}\n\n${{ env.CHANGELOG_ENTRY }}\n\n**Install:** [VS Code Marketplace](https://marketplace.visualstudio.com/items?itemName=poly-glot-ai.poly-glot)`,
              draft:       false,
              prerelease:  false,
            });

            // Attach .vsix to release
            const vsixData = fs.readFileSync(vsixPath);
            await github.rest.repos.uploadReleaseAsset({
              owner:    context.repo.owner,
              repo:     context.repo.repo,
              release_id: release.data.id,
              name:     `poly-glot-${version}.vsix`,
              data:     vsixData,
              headers:  { 'content-type': 'application/zip' },
            });
            console.log(`✅ Release vscode-v${version} created with .vsix attached`);

      - name: Commit version bump + CHANGELOG
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add vscode-extension/package.json \
                  vscode-extension/package-lock.json \
                  vscode-extension/CHANGELOG.md \
                  "vscode-extension/poly-glot-${{ steps.version.outputs.new_version }}.vsix" || true
          git diff --staged --quiet || \
            git commit -m "chore: release VS Code extension v${{ steps.version.outputs.new_version }} [skip ci]"
          git push

      - name: Notify local watcher + trigger site update
        run: |
          # Fires macOS watcher → Desktop notification + Finder reveal
          curl -s -X POST \
            -H "Authorization: Bearer ${{ secrets.GH_PAT }}" \
            -H "Accept: application/vnd.github+json" \
            -H "Content-Type: application/json" \
            "https://api.github.com/repos/poly-glot-ai/poly-glot/dispatches" \
            -d "{\"event_type\":\"vscode_version_updated\",\"client_payload\":{\"version\":\"${{ steps.version.outputs.new_version }}\"}}"

          # Triggers site auto-update
          curl -s -X POST \
            -H "Authorization: Bearer ${{ secrets.GH_PAT }}" \
            -H "Accept: application/vnd.github+json" \
            -H "Content-Type: application/json" \
            "https://api.github.com/repos/poly-glot-ai/poly-glot/dispatches" \
            -d '{"event_type":"npm_published"}'

          echo "✅ Watcher notified. Site update triggered."

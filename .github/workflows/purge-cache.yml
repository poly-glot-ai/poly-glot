name: Purge Cloudflare Cache

# ─────────────────────────────────────────────────────────────────────────────
# Triggers on every push to main that contains [deploy] in the commit message,
# or on manual dispatch. Purges Cloudflare CDN so users always get fresh files.
# Requires secrets: CF_ZONE_ID, CF_API_TOKEN
# ─────────────────────────────────────────────────────────────────────────────
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  purge:
    runs-on: ubuntu-latest
    # Only purge on [deploy] commits or manual dispatch — skip bot auto-updates
    if: |
      github.event_name == 'workflow_dispatch' ||
      contains(github.event.head_commit.message, '[deploy]')

    steps:
      - name: Purge Cloudflare cache
        run: |
          echo "🧹 Purging Cloudflare CDN for poly-glot.ai…"
          RESPONSE=$(curl -s -X POST \
            "https://api.cloudflare.com/client/v4/zones/${{ secrets.CF_ZONE_ID }}/purge_cache" \
            -H "Authorization: Bearer ${{ secrets.CF_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            --data '{"purge_everything":true}')
          echo "Response: $RESPONSE"
          SUCCESS=$(echo "$RESPONSE" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('success','false'))")
          if [ "$SUCCESS" = "True" ]; then
            echo "✅ Cloudflare cache purged successfully"
          else
            echo "❌ Cache purge failed — check CF_ZONE_ID and CF_API_TOKEN secrets"
            echo "$RESPONSE"
            exit 1
          fi

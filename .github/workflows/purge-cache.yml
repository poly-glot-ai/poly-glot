name: Purge Cloudflare Cache

# ─────────────────────────────────────────────────────────────────────────────
# Triggers on every push to main that contains [deploy] in the commit message,
# or on manual dispatch. Purges Cloudflare CDN so users always get fresh files.
# Requires secrets: CF_ZONE_ID, CF_API_TOKEN
# ─────────────────────────────────────────────────────────────────────────────
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  purge:
    runs-on: ubuntu-latest
    # Only purge on [deploy] commits or manual dispatch — skip bot auto-updates
    if: |
      github.event_name == 'workflow_dispatch' ||
      contains(github.event.head_commit.message, '[deploy]')

    steps:
      - name: Purge Cloudflare cache
        run: |
          # Use CF_CACHE_TOKEN if set (needs Zone:Cache Purge permission only).
          # Falls back to CF_API_TOKEN. If neither works, skip gracefully —
          # worker deploy is the critical path; cache purge is best-effort.
          TOKEN="${{ secrets.CF_CACHE_TOKEN }}"
          if [ -z "$TOKEN" ]; then
            TOKEN="${{ secrets.CF_API_TOKEN }}"
          fi
          if [ -z "$TOKEN" ]; then
            echo "⚠️  No CF token available — skipping cache purge"
            exit 0
          fi
          echo "🧹 Purging Cloudflare CDN for poly-glot.ai…"
          RESPONSE=$(curl -s -X POST \
            "https://api.cloudflare.com/client/v4/zones/${{ secrets.CF_ZONE_ID }}/purge_cache" \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/json" \
            --data '{"purge_everything":true}')
          echo "Response: $RESPONSE"
          SUCCESS=$(echo "$RESPONSE" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('success','false'))")
          if [ "$SUCCESS" = "True" ]; then
            echo "✅ Cloudflare cache purged successfully"
          else
            echo "⚠️  Cache purge failed (token may lack Zone:Cache Purge permission) — skipping"
            echo "To fix: add CF_CACHE_TOKEN secret with Zone:Cache Purge permission"
            echo "$RESPONSE"
            exit 0
          fi

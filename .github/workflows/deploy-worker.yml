name: Deploy Auth Worker

# Deploys the Cloudflare Worker on every push to main that contains [deploy]
# or on manual dispatch.
#
# Required secret: CF_API_TOKEN
#   Create at: https://dash.cloudflare.com/profile/api-tokens
#   Use template: "Edit Cloudflare Workers"
#   Also add:  User > User Details > Read
#
# If CF_API_TOKEN is missing or lacks permissions this step is skipped
# gracefully — deploy manually with: cd auth-worker && npx wrangler deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' ||
      contains(github.event.head_commit.message, '[deploy]')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Deploy Worker
        working-directory: auth-worker
        # Skip gracefully if token is missing or lacks permissions
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "⚠️  CF_API_TOKEN secret not set — skipping worker deploy."
            echo "To enable: add a Cloudflare API token with 'Edit Cloudflare Workers' + 'User Details: Read' permissions."
            exit 0
          fi
          npx wrangler deploy || {
            echo "⚠️  Worker deploy failed — check CF_API_TOKEN permissions."
            echo "Token needs: Workers Scripts:Edit + Workers KV:Edit + Workers Routes:Edit + User Details:Read"
            echo "Falling back to manual deploy: cd auth-worker && npx wrangler deploy"
            exit 0
          }
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: 2cabfc7790be3c1b60b990b6dec400a3

name: Deploy Workers

# Deploys both Cloudflare Workers on every push to main that contains [deploy]
# or on manual dispatch.
#
# Required secret: CF_API_TOKEN
#   Create at: https://dash.cloudflare.com/profile/api-tokens
#   Use template: "Edit Cloudflare Workers"
#   Also add:  User > User Details > Read
#
# If CF_API_TOKEN is missing or lacks permissions all steps are skipped
# gracefully — deploy manually with: cd <worker-dir> && npx wrangler deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy-auth-worker:
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' ||
      contains(github.event.head_commit.message, '[deploy]')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Deploy Auth Worker
        working-directory: auth-worker
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "⚠️  CF_API_TOKEN secret not set — skipping auth-worker deploy."
            exit 0
          fi
          npx wrangler deploy || {
            echo "⚠️  Auth worker deploy failed — check CF_API_TOKEN permissions."
            exit 0
          }
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: 2cabfc7790be3c1b60b990b6dec400a3

  deploy-telemetry-worker:
    runs-on: ubuntu-latest
    needs: deploy-auth-worker   # auth worker must deploy first (service binding dependency)
    if: |
      github.event_name == 'workflow_dispatch' ||
      contains(github.event.head_commit.message, '[deploy]')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Deploy Telemetry Worker
        working-directory: telemetry-worker
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "⚠️  CF_API_TOKEN secret not set — skipping telemetry-worker deploy."
            exit 0
          fi
          npx wrangler deploy || {
            echo "⚠️  Telemetry worker deploy failed — check CF_API_TOKEN permissions."
            exit 0
          }
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: 2cabfc7790be3c1b60b990b6dec400a3

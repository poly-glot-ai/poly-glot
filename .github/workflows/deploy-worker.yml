name: Deploy Auth Worker

# Deploys the Cloudflare Worker on every push to main that contains [deploy]
# or on manual dispatch.
#
# Required secret: CF_API_TOKEN
#   Create at: https://dash.cloudflare.com/profile/api-tokens
#   Permissions needed:
#     - Account > Workers Scripts > Edit
#     - Account > Workers KV Storage > Edit
#     - Zone > Workers Routes > Edit
#     - User > User Details > Read   ← required for wrangler auth

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' ||
      contains(github.event.head_commit.message, '[deploy]')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Deploy Worker
        working-directory: auth-worker
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: 2cabfc7790be3c1b60b990b6dec400a3
